name: Build and publish ha-test image

on:
  push:
    branches: [main]
    paths:
      - remoteterm-ha-test/Dockerfile
      - remoteterm-ha-test/run.sh
      - remoteterm-ha-test/config.yaml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/remoteterm-app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ha-test image
        uses: docker/build-push-action@v6
        with:
          context: remoteterm-ha-test/
          # Builds from upstream ha branch source — takes longer than normal
          # (~15-20 min) due to cloning and full frontend build under QEMU.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ha-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
