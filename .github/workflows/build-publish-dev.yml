name: Build and publish dev image

on:
  push:
    branches: [main]
    paths:
      - remoteterm-dev/Dockerfile
      - remoteterm-dev/run.sh
      - remoteterm-dev/config.yaml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/remoteterm-app-dev
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate date-based version
        id: version
        run: |
          VERSION=$(date -u +"%Y.%m.%d")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building dev version ${VERSION}"

      - name: Stamp version into config.yaml
        run: |
          sed -i "s/^version: .*/version: \"${{ steps.version.outputs.version }}\"/" remoteterm-dev/config.yaml

      - name: Commit updated config.yaml if version changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add remoteterm-dev/config.yaml
          git diff --cached --quiet || git commit -m "chore: stamp dev version ${{ steps.version.outputs.version }}"
          git push || true

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: remoteterm-dev/
          # Builds from upstream main — takes longer than normal
          # (~15-20 min) due to cloning and full frontend build under QEMU.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
